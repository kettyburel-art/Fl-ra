<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond arrondi vert forêt -->
  <rect width="512" height="512" rx="110" fill="#2d4a3e"/>
  <!-- Lettre F en Playfair style -->
  <text
    x="256"
    y="345"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="300"
    font-style="italic"
    font-weight="400"
    fill="#f7f3ee"
    text-anchor="middle"
    letter-spacing="-8">F</text>
  <!-- Petit accent décoratif sous le F -->
  <line x1="160" y1="390" x2="310" y2="390" stroke="#6aaa8a" stroke-width="8" stroke-linecap="round"/>
</svg>
